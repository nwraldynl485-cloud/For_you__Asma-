<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة خاصة ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
    *{ margin:0; padding:0; box-sizing:border-box; font-family:'Cairo', sans-serif; }
    
    body{ 
        height:100vh; display:flex; justify-content:center; align-items:center; 
        background:radial-gradient(circle at top,#ff5f8f 0%,#1c1c1c 45%,#0f0f0f 100%); 
        color:white; overflow:hidden; position: relative; 
    }
    
    /* القلوب في الخلفية */
    .hearts-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .heart { position: absolute; color: #ff4f81; animation: float linear infinite; opacity: 0.6; }
    @keyframes float {
        from { transform: translateY(100vh) rotate(0deg); opacity: 0; }
        50% { opacity: 1; }
        to { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
    }
    
    .card{ width:90%; max-width:500px; padding:40px; border-radius:30px; background:rgba(255,255,255,0.1); backdrop-filter:blur(15px); text-align:center; position:relative; z-index:2; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    
    .buttons-container{ display:flex; justify-content:center; align-items:center; gap: 40px; margin-top:40px; height: 80px; position: relative; }
    
    button{ padding:15px 30px; border:none; border-radius:15px; font-size:18px; cursor:pointer; font-weight:600; transition:all 0.3s ease; }
    
    #yesBtn{ background:linear-gradient(45deg,#ff4f81,#ff7eb3); color:white; }
    #noBtn{ background:#444; color:white; }
    
    .hidden{ display:none; }
    input, select{ width:100%; padding:12px; margin-top:10px; border-radius:10px; border:none; background:rgba(255,255,255,0.15); color:white; outline:none; }
    select option{ color:black; }
    #confirmBtn{ margin-top:20px; width:100%; background:linear-gradient(45deg,#ff4f81,#ff7eb3); color:white; }
</style>
</head>
<body>

<div class="hearts-container" id="heartsContainer"></div>

<div class="card" id="card">
    <div id="step1">
        <h1>عزيزتي عصماء ❤️</h1>
        <p>هل تقبلين أن تجعلي يومي أجمل وتخرجي معي في موعد؟ 😉</p>
        <div class="buttons-container">
            <button id="yesBtn">نعم 😍</button>
            <button id="noBtn">لا 😅</button>
        </div>
    </div>

    <div id="step2" class="hidden">
        <h1>اختيار رائع ✨</h1>
        <input type="date" id="dateInput">
        <input type="time" id="timeInput">
        <select id="citySelect">
            <option value="">اختر المدينة</option>
            <option>الخرطوم</option>
            <option>بحري</option>
            <option>أم درمان</option>
        </select>
        <select id="restaurantSelect">
            <option value="">اختر المطعم</option>
            <option>Pizza Hut 🍕</option>
            <option>Romantic Cafe ☕</option>
            <option>Italian Restaurant 🍝</option>
            <option>Luxury Rooftop 🍷</option>
        </select>
        <select id="foodSelect">
            <option value="">اختر وجبتك المفضلة</option>
            <option>بيتزا 🍕</option>
            <option>ستيك 🥩</option>
            <option>باستا 🍝</option>
            <option>حلو وقهوة 🍰☕</option>
        </select>
        <button id="confirmBtn">تأكيد الموعد ❤️</button>
    </div>

    <div id="step3" class="hidden">
        <h1>تم الحجز بنجاح 😍</h1>
        <p id="finalMessage" style="font-size: 20px; line-height: 1.8; margin-top: 15px;"></p>
    </div>
</div>

<script>
    // إنشاء القلوب
    function createHeart() {
        const heart = document.createElement("div");
        heart.innerHTML = "❤";
        heart.classList.add("heart");
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 10 + "px";
        heart.style.animationDuration = Math.random() * 3 + 4 + "s";
        document.getElementById("heartsContainer").appendChild(heart);
        setTimeout(() => heart.remove(), 7000);
    }
    setInterval(createHeart, 400);

    // منطق الأزرار
    const noBtn = document.getElementById("noBtn");
    let clickCount = 0;

    function moveButton() {
        clickCount++;
        if(clickCount >= 3) alert("Just pick the other button pls 🙂🤝");
        
        // تحريك الزر بشكل عشوائي داخل الشاشة
        noBtn.style.position = 'fixed';
        noBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
        noBtn.style.top = Math.random() * (window.innerHeight - 50) + "px";
    }

    noBtn.addEventListener("mouseover", moveButton);
    noBtn.addEventListener("click", moveButton);

    document.getElementById("yesBtn").addEventListener("click", () => {
        confetti({ particleCount: 200, spread: 70 });
        document.getElementById("step1").classList.add("hidden");
        document.getElementById("step2").classList.remove("hidden");
    });

    document.getElementById("confirmBtn").addEventListener("click", () => {
        const date = document.getElementById("dateInput").value;
        const time = document.getElementById("timeInput").value;
        const city = document.getElementById("citySelect").value;
        const restaurant = document.getElementById("restaurantSelect").value;
        const food = document.getElementById("foodSelect").value;

        if(!date || !time || !city || !restaurant || !food) {
            alert("أملي باقـي الاستبيان يــا دكتوره 🙂🤝");
            return;
        }

        document.getElementById("step2").classList.add("hidden");
        document.getElementById("step3").classList.remove("hidden");
        document.getElementById("finalMessage").innerHTML = `بانتظارك ❤️<br>${date} | ${time}<br>${city}<br>${restaurant}<br>${food}<br>ستكون ليلة لا تُنسى ✨`;
        confetti({ particleCount: 300, spread: 150 });
    });
</script>
</body>
</html>
